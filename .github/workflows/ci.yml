name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check

  test:
    name: Tests (Postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # The vitest setup derives DATABASE_URL from this and creates the test DB,
      # the pg_trgm extension, and runs migrations itself.
      DATABASE_URL_TEST: postgresql://postgres:postgres@localhost:5432/movie_explorer_test
      JWT_SECRET: ci-test-secret-must-be-at-least-32-characters
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  notify:
    name: Telegram — CI failure
    runs-on: ubuntu-latest
    needs: [check, test]
    if: failure()
    steps:
      - name: Send Telegram message
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          COMMIT_TITLE: ${{ github.event.head_commit.message || github.event.pull_request.title }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "TELEGRAM_BOT_TOKEN / TELEGRAM_CHAT_ID not set — skipping notification."
            exit 0
          fi
          title=$(printf '%s' "$COMMIT_TITLE" | head -1 | cut -c1-80)
          text=$(printf '❌ CI failed\nrepo: %s\nbranch: %s\ncommit: %s %s\n%s/%s/actions/runs/%s' \
            "$GITHUB_REPOSITORY" "$GITHUB_REF_NAME" "${GITHUB_SHA:0:7}" "$title" \
            "$GITHUB_SERVER_URL" "$GITHUB_REPOSITORY" "$GITHUB_RUN_ID")
          curl -fsS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${text}" \
            -d "disable_web_page_preview=true" > /dev/null
