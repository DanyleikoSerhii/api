name: Migrate prod DB

# Runs Drizzle migrations against the production database after code lands on
# main. Kept separate from the Vercel build on purpose: a DB hiccup must not
# break a deploy, and the build environment shouldn't need DB credentials.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Avoid two migration runs racing on the same database.
concurrency:
  group: migrate-prod
  cancel-in-progress: false

jobs:
  migrate:
    name: Drizzle migrate
    runs-on: ubuntu-latest
    env:
      # Nile / Vercel Postgres expose the connection string as POSTGRES_URL;
      # env.ts accepts it as a fallback for DATABASE_URL.
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      # env.ts validates JWT_SECRET (>=32 chars) at import time, but migrations
      # never use it — a placeholder keeps the one required secret to DATABASE_URL.
      JWT_SECRET: ci-migrate-placeholder-not-used-by-migrations
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Apply migrations
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::DATABASE_URL secret is not set — add it in repo Settings → Secrets → Actions."
            exit 1
          fi
          pnpm db:migrate
