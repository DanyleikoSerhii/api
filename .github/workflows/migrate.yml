name: Migrate prod DB

# The Vercel build can't run migrations — the managed Postgres (Nile) doesn't
# grant the build the DDL permissions it needs, so `db:migrate` was dropped from
# the build (see commit 09526c7). That let the prod schema drift behind the code
# (e.g. missing titles.backdrop_url -> 42703 on every /api/movies query). This
# workflow closes that gap from a context that has DDL rights, using
# PROD_DATABASE_URL from secrets.
#
# It runs `db:sync` (not the journaled `db:migrate`): Nile's role can't CREATE
# the "drizzle" bookkeeping schema the migrator needs, and prod was bootstrapped
# without that journal — so the migrator would also try to replay 0000 over
# existing tables. `db:sync` instead applies the idempotent, guarded DDL in
# drizzle/prod-sync.sql, which only needs ALTER/CREATE on existing objects.
#
# Trigger: every push to main that changes migrations or the schema, plus manual
# dispatch. Changes are additive, so running in parallel with Vercel's
# auto-deploy is safe; the convergence SQL is idempotent and re-runnable.

on:
  push:
    branches: [main]
    paths:
      - 'drizzle/migrations/**'
      - 'drizzle/prod-sync.sql'
      - 'src/db/schema.ts'
  workflow_dispatch:

# Don't let two convergence runs race on the same database.
concurrency:
  group: migrate-prod
  cancel-in-progress: false

jobs:
  migrate:
    name: Converge prod schema
    runs-on: ubuntu-latest
    env:
      # The standalone runner (src/db/sync.ts) reads DATABASE_URL (or
      # POSTGRES_URL) and enables TLS automatically for non-local hosts.
      DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Apply schema convergence
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "PROD_DATABASE_URL secret not set — skipping." >&2
            exit 1
          fi
          pnpm db:sync
